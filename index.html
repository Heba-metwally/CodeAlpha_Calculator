<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <meta name="description"
        content="Responsive Calculator built using HTML, CSS and JavaScript">
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="calculator">
        <div class="screen">
            <div class="screen-history"></div>
            <div class="screen-result">0</div>
        </div>
        <div class="buttons">
            <div class="buttons-row">
                <button class="button" data-action="modulus" tabindex="-1">%</button>
                <button class="button" data-action="clear_all" tabindex="-1">CE</button>
                <button class="button" data-action="clear" tabindex="-1">C</button>
                <button class="button" data-action="multiply" tabindex="-1">×</button>
            </div>
            <div class="buttons-row">
                <button class="button" data-value="7" tabindex="-1">7</button>
                <button class="button" data-value="8" tabindex="-1">8</button>
                <button class="button" data-value="9" tabindex="-1">9</button>
                <button class="button" data-action="divide" tabindex="-1">÷</button>
            </div>
            <div class="buttons-row">
                <button class="button" data-value="4" tabindex="-1">4</button>
                <button class="button" data-value="5" tabindex="-1">5</button>
                <button class="button" data-value="6" tabindex="-1">6</button>
                <button class="button" data-action="minus" tabindex="-1">−</button>
            </div>
            <div class="buttons-row">
                <button class="button" data-value="1" tabindex="-1">1</button>
                <button class="button" data-value="2" tabindex="-1">2</button>
                <button class="button" data-value="3" tabindex="-1">3</button>
                <button class="button" data-action="plus" tabindex="-1">+</button>
            </div>
            <div class="buttons-row">
                <button class="button" data-action="sign" tabindex="-1">±</button>
                <button class="button" data-value="0" tabindex="-1">0</button>
                <button class="button" data-value="." tabindex="-1">.</button>
                <button class="button button-equal" data-action="equal" tabindex="-1">=</button>
            </div>
        </div>
    </main>
    <script src="script.js"></script>

</body>
</html>
