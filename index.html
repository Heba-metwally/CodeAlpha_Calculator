<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator | CodeAlpha Task 2</title>
    <meta name="description"
        content="Responsive Calculator built using HTML, CSS and JavaScript">
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="calculator">
        <div class="screen">
            <div class="screen-history"></div>
            <div class="screen-result">0</div>
        </div>
        <div class="buttons">
            <div class="buttons-row">
                <button class="button" data-action="modulus">%</button>
                <button class="button" data-action="clear_all">CE</button>
                <button class="button" data-action="clear">C</button>
                <button class="button" data-action="multiply">×</button>
            </div>
            <div class="buttons-row">
                <button class="button" data-value="7">7</button>
                <button class="button" data-value="8">8</button>
                <button class="button" data-value="9">9</button>
                <button class="button" data-action="divide">÷</button>
            </div>
            <div class="buttons-row">
                <button class="button" data-value="4">4</button>
                <button class="button" data-value="5">5</button>
                <button class="button" data-value="6">6</button>
                <button class="button" data-action="minus">−</button>
            </div>
            <div class="buttons-row">
                <button class="button" data-value="1">1</button>
                <button class="button" data-value="2">2</button>
                <button class="button" data-value="3">3</button>
                <button class="button" data-action="plus">+</button>
            </div>
            <div class="buttons-row">
                <button class="button" data-action="sign">±</button>
                <button class="button" data-value="0">0</button>
                <button class="button" data-value=".">.</button>
                <button class="button button-equal" data-action="equal">=</button>
            </div>
        </div>
    </main>
    <script src="script.js"></script>

</body>
</html>
